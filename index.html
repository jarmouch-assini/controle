<style>
:root{--bg:#eef1f6;--card:#fff;--ink:#1f2733;--mut:#7b8694;--line:#eef1f5}

.cbar-out span{display:block;font-size:12px;color:var(--mut);margin-top:1px}
</style></head><body>
<div id="login"><div class="box"><h2 style="font-size:20px">Controle</h2><div class="small" style="margin-top:4px">Digite a senha pra abrir</div><input id="pw" type="password" placeholder="senha" autocomplete="current-password"/><div class="err" id="lerr"></div><button onclick="submitPw()">Entrar</button></div></div>

<script>

function mlab2(d){if(!d)return '';var p=d.split('-');return p[2]+'/'+p[1];}

function col(c){return CMAP[c]||'#b3bcc8';}
function inSel(g){return SEL==='todos'||gm(g)===SEL;}
function submitPw(){var v=document.getElementById('pw').value;if(!v)return;fetchData(v);}

function showLogin(msg){document.getElementById('app').style.display='none';document.getElementById('login').style.display='flex';document.getElementById('lerr').textContent=msg||'';}

var LAST_FETCH=0;
function fetchData(pw){fetch(BASE+'?pw='+encodeURIComponent(pw)+'&_='+Date.now(),{cache:'no-store',headers:{apikey:KEY}}).then(function(r){if(r.status===401)throw new Error('senha');return r.json();}).then(function(j){DATA=j;LAST_FETCH=Date.now();localStorage.setItem('painel_pw',pw);document.getElementById('login').style.display='none';document.getElementById('app').style.display='block';boot();}).catch(function(e){showLogin(e&&e.message==='senha'?'Senha incorreta':'Erro ao carregar');});}
function boot(){var set={};DATA.gastos.forEach(function(g){var m=gm(g);if(m)set[m]=1;});MONTHS=Object.keys(set).sort();var now=new Date();var cur=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');SEL=set[cur]?cur:(MONTHS[MONTHS.length-1]||'todos');shell();buildLine();renderCartoes();renderPeriod();renderContas();}
function shell(){var opts='<option value="todos">Todos os meses</option>';for(var i=MONTHS.length-1;i>=0;i--){opts+='<option value="'+MONTHS[i]+'">'+mlab(MONTHS[i])+'</option>';}
var cats=KEEP.concat(['Família e outros']);var copts='<option value="todas">Todas as categorias</option>';cats.forEach(function(c){copts+='<option value="'+c+'">'+c+'</option>';});
var h='<h1 style="font-size:24px;margin:6px 2px 2px">Controle</h1><div class="small" style="margin:0 2px 8px">seu dinheiro, de verdade</div>'
+'<div class="hero"><div class="h"><div class="lab">Caixa agora</div><div class="val" id="hCaixa">-</div><div class="sub" id="hCaixaSync" style="font-size:10.5px;color:#9aa3af;margin-top:2px"></div><div class="sub" id="hCaixaPlan" style="font-size:11px;margin-top:6px;line-height:1.6"></div></div><div class="h"><div class="lab">Renda do mês</div><div class="val" id="hRenda">-</div><div class="sub" id="hRendaMesDet" style="font-size:11px;color:#9aa3af;margin-top:3px;line-height:1.5"></div></div><div class="h"><div class="lab">Entrou no mês</div><div class="val" id="hRendaAtual">-</div><div class="sub" id="hRendaDet" style="font-size:11px;color:#9aa3af;margin-top:3px;line-height:1.5"></div></div><div class="h"><div class="lab">Saiu no mês</div><div class="val" id="hSaiu">-</div><div class="sub" id="hSaiuDet" style="font-size:11px;color:#9aa3af;margin-top:3px;line-height:1.5"></div></div></div>'
+'<div class="card"><div class="ttl">Ritmo das sextas</div><div class="small" style="margin-bottom:2px">R$ 3.500 entram toda sexta. O verde é o quanto investir em cada uma (40%).</div><div class="sex-grid" id="sextas"></div></div>'

document.getElementById('app').innerHTML=h;document.getElementById('mes').value=SEL;var ce=document.getElementById('cat');if(ce)ce.value=CAT;var te=document.getElementById('tlf');if(te)te.value=TLF;}
function buildGroups(){var map={};DATA.gastos.forEach(function(g){if(!inSel(g))return;var cat=grp(g.categoria||'Outros');if(!map[cat])map[cat]={name:cat,color:col(cat),value:0,subs:{}};var v=num(g.valor);map[cat].value+=v;var sn=(cat==='Família e outros')?(g.categoria||'Outros'):(g.subcategoria||null);if(sn){map[cat].subs[sn]=(map[cat].subs[sn]||0)+v;}});var arr=Object.keys(map).map(function(k){var o=map[k];var subs=Object.keys(o.subs).map(function(s){return{name:s,value:o.subs[s]};}).sort(function(a,b){return b.value-a.value;});return{name:o.name,color:o.color,value:o.value,subs:subs};});arr.sort(function(a,b){return b.value-a.value;});return arr;}
function buildDonut(groups){if(CAT==='todas'){return{slices:groups.map(function(g){return{name:g.name,value:g.value,color:g.color};}),tree:groups};}

function renderPeriod(){var groups=buildGroups();var tot=0;groups.forEach(function(g){tot+=g.value;});
var totDebita=0;var totCofrinho=0;var totSaiuReal=0;DATA.gastos.forEach(function(g){if(!inSel(g))return;if(g.origem_fundo==='cofrinho'){totCofrinho+=num(g.valor);if(!(g.afeta_saldo===false||g.afeta_saldo==='false'))totSaiuReal+=num(g.valor);return;}if(g.debita_caixa===false||g.debita_caixa==='false')return;totDebita+=num(g.valor);if(!(g.afeta_saldo===false||g.afeta_saldo==='false'))totSaiuReal+=num(g.valor);});

var rendApl=0;(DATA.rendimentos||[]).forEach(function(rr){if(SEL==='todos'||(rr.mes||'')===SEL)rendApl+=num(rr.valor);});document.getElementById('hCaixa').textContent=brl0(caixa);document.getElementById('hRenda').textContent=brl0(rmEntrada+rmRendimento);document.getElementById('hSaiu').textContent=brl0(totSaiuReal);document.getElementById('hRendaAtual').textContent=brl0(rendaEntrada+rendaReserva+totCofrinho);
