<style>
:root{--bg:#eef1f6;--card:#fff;--ink:#1f2733;--mut:#7b8694;--line:#eef1f5}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:'Bricolage Grotesque',Inter,sans-serif;margin:0;letter-spacing:-.01em}
.wrap{max-width:780px;margin:0 auto;padding:14px 13px 70px}
.card{background:var(--card);border-radius:20px;padding:17px;margin:12px 0;box-shadow:0 1px 3px rgba(20,30,50,.05)}
.ttl{font-size:19px;font-weight:800;margin-bottom:6px}
.mut{color:var(--mut)}
.hero{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pagelayout{display:grid;grid-template-columns:auto 520px;gap:10px;align-items:start}
.chatcol{position:sticky;top:14px}
.maincol{display:flex;flex-direction:column}
.maincol>.hero{margin-top:2px}
.botcard{background:var(--card);border-radius:20px;padding:17px;min-height:300px;display:flex;flex-direction:column}
.bot-log{flex:1;display:flex;flex-direction:column;gap:8px;overflow-y:auto;max-height:420px;padding:2px 0 8px}
.bot-log:empty{display:none}
.bot-b{max-width:88%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word}
.bot-b.b{align-self:flex-start;background:#eef1f8;color:#2a3550;border-bottom-left-radius:4px}
.bot-b.u{align-self:flex-end;background:#4b5bd6;color:#fff;border-bottom-right-radius:4px}
.bot-opts{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.bot-opt{padding:7px 11px;border-radius:12px;border:1.5px solid #4b5bd6;background:#fff;color:#4b5bd6;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.bot-opt:hover,.bot-opt:active{background:#4b5bd6;color:#fff}
.bot-inp{display:flex;gap:8px;margin-top:6px}
.bot-inp input{flex:1;padding:10px 14px;border:1.5px solid #e1e5ee;border-radius:14px;font-size:15px;outline:none;font-family:inherit}
.bot-inp input:focus{border-color:#4b5bd6}
.bot-inp button{padding:10px 18px;border-radius:14px;border:none;background:#4b5bd6;color:#fff;font-weight:700;cursor:pointer;font-size:14px}
.bot-sum{background:#f0f3ff;border-radius:14px;padding:14px;font-size:13px;line-height:1.7;margin-top:6px}
.bot-sum b{color:#2a3550}
.bot-acts{display:flex;gap:8px;margin-top:8px}
.bot-acts button{flex:1;padding:12px;border-radius:14px;border:none;font-weight:700;font-size:14px;cursor:pointer}
.bot-acts .ok{background:#27c498;color:#fff}
.bot-acts .cl{background:#eef1f8;color:#7a8aa0}
.bot-menu{display:flex;gap:8px}
.bot-menu button{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;padding:18px 6px;border-radius:16px;border:1.5px solid #e1e5ee;background:#fff;cursor:pointer;transition:all .15s}
.bot-menu button:hover,.bot-menu button:active{border-color:#4b5bd6;background:#f0f3ff}
.bot-menu svg{width:38px;height:38px}
.bot-menu span{font-size:12px;font-weight:700;color:#2a3550}
@media(max-width:800px){.wrap{max-width:520px}.pagelayout{grid-template-columns:1fr}.chatcol{position:static}.botcard{min-height:auto}}
.h{background:var(--card);border-radius:18px;padding:14px;box-shadow:0 1px 3px rgba(20,30,50,.05)}
.h .lab{font-size:12px;color:var(--mut);font-weight:600}
.h .val{font-size:21px;font-weight:800;font-family:'Bricolage Grotesque',Inter;margin-top:3px}
.selrow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:2px 0 14px}
.selstack{display:flex;flex-direction:column;gap:8px;margin:2px 0 14px}
.selstack .sr{display:flex;align-items:center;gap:10px}
.selstack select{width:100%;min-width:0;flex:1}
.selstack .sl{font-size:13px;font-weight:600;color:var(--mut);flex:0 0 70px}
select{appearance:none;-webkit-appearance:none;background:#f4f6fa url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 fill=%22%237b8694%22><path d=%22M2 4l4 4 4-4z%22/></svg>') no-repeat right 12px center;border:1px solid #e6eaf0;border-radius:12px;padding:9px 30px 9px 13px;font-family:inherit;font-size:14px;font-weight:600;color:var(--ink);min-width:150px}
.donutWrap{position:relative;width:170px;height:170px;flex:0 0 170px;margin:auto}
.donutCenter{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.donutCenter b{font-size:20px;font-weight:800;font-family:'Bricolage Grotesque',Inter}
.donutCenter span{font-size:11px;color:var(--mut)}
.row2{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.tree{flex:1;min-width:170px}
.trow{display:flex;align-items:center;gap:8px;padding:5px 0;font-weight:700;font-size:14px}
.trow .v{margin-left:auto;font-variant-numeric:tabular-nums}
.dot{width:11px;height:11px;border-radius:4px;flex:0 0 11px}
.srow{display:flex;align-items:center;gap:8px;padding:2px 0 2px 19px;font-size:12.5px;color:#56616f}

.srow .v{margin-left:auto;font-variant-numeric:tabular-nums}
.tl{margin-top:4px}
.li{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--line)}

.li .desc{font-weight:600;font-size:14px;line-height:1.2}

.badge{display:inline-block;font-size:10.5px;font-weight:600;color:#5b6675;background:#eef1f6;border-radius:7px;padding:2px 7px;margin-top:3px}
.bar{height:9px;border-radius:6px;background:#eef1f6;overflow:hidden;margin:6px 0 2px}
.bar>i{display:block;height:100%;border-radius:6px}

.bar>i.metaosc{animation:metaOsc 1.7s ease-in-out infinite;transition:width .6s ease,background .6s ease}
.lineWrap{height:230px;margin-top:6px}
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;padding:24px;z-index:9}

.err{color:#e03b3b;font-size:13px;min-height:16px}
.small{font-size:12px;color:var(--mut)}
.sex-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
.sex-card{background:#f8f9fb;border-radius:14px;padding:12px 6px;text-align:center;border:1.5px solid transparent}
.sex-card.now{background:#fffbef;border-color:#f5d97a}
.sex-card .sl{font-size:11px;color:var(--mut);font-weight:600;margin-bottom:2px}
.sex-card .sd{font-size:22px;font-weight:800;font-family:'Bricolage Grotesque',Inter}
.sex-card .sv{font-size:12px;color:var(--mut);margin-top:6px}
.sex-card .si{font-size:12.5px;font-weight:600;color:#27c498;margin-top:3px}
.sex-star{position:relative}
.sex-star::after{content:'⭐';position:absolute;top:-8px;right:-2px;font-size:14px}
.est-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line)}
.est-row:first-child{border-top:none}
.est-rank{width:22px;height:22px;border-radius:7px;background:#eef1f6;color:#5b6675;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:0 0 22px}
.est-row.hot .est-rank{background:#ffe7e3;color:#ff6b5b}
.est-name{font-weight:600;font-size:14px;line-height:1.2;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.est-sub{font-size:11.5px;color:var(--mut);margin-top:1px}
.est-val{margin-left:auto;text-align:right;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
.est-bar{height:6px;border-radius:4px;background:#eef1f6;overflow:hidden;margin-top:4px}
.est-bar>i{display:block;height:100%;border-radius:4px;background:#ff6b5b}
.pv-line{display:flex;justify-content:space-between;align-items:baseline;padding:9px 0;border-top:1px solid var(--line)}
.pv-line:first-child{border-top:none}
.pv-line .lab{font-size:14px;color:var(--ink)}
.pv-line .lab small{display:block;font-size:11.5px;color:var(--mut)}
.pv-line .val{font-weight:700;font-variant-numeric:tabular-nums}
.pv-line.tot{border-top:2px solid #e6eaf0;margin-top:4px;padding-top:12px}
.pv-line.tot .lab{font-weight:700;font-size:15px}

.pv-pos{color:#27c498}.pv-neg{color:#ff6b5b}.pv-out{color:#ff6b5b}
.pv-list{margin-top:8px}
.pv-item{display:flex;justify-content:space-between;font-size:12.5px;color:var(--mut);padding:3px 0}
.pv-carry{background:#eef4ff;border-radius:10px;padding:8px 10px;margin-top:8px;font-size:12.5px;color:#3d5a96}
.cbars{display:flex;align-items:flex-end;gap:10px;height:150px;margin:14px 0 6px;padding-top:8px}
.cbars-wrap{display:flex;align-items:center;gap:6px}

.cnav{flex:0 0 30px;width:30px;height:30px;border-radius:50%;border:1px solid #e6eaf0;background:#fff;color:#5b6675;font-size:18px;line-height:1;cursor:pointer;display:none;align-items:center;justify-content:center;padding:0}
.cnav:active{background:#eef1f6}
.cnav.on{display:flex}
.cbar{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;height:100%;justify-content:flex-end}
.cbar .col{width:100%;max-width:46px;border-radius:8px 8px 0 0;background:#5b8def;transition:opacity .15s;min-height:4px}

.cbar-out span{display:block;font-size:12px;color:var(--mut);margin-top:1px}
